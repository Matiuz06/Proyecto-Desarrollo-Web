"frontend: html":
  - changed-files:
      - any-glob-match-pattern: "**/*.html"

"frontend: css":
  - changed-files:
      - any-glob-match-pattern: "**/*.css"

"frontend: js":
  - changed-files:
      - any-glob-match-pattern: "**/*.js"

"assets":
  - changed-files:
      - any-glob-match-pattern: ["**/*.png", "**/*.jpg", "**/*.jpeg", "**/*.svg", "**/*.webp"]

"ci/cd":
  - changed-files:
      - any-glob-match-pattern: ".github/workflows/**"

"docs":
  - changed-files:
      - any-glob-match-pattern: ["**/*.md", "docs/**"]
