name: Labeler automático

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: Etiquetar PR según archivos modificados
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
