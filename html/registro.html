<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
</head>
<h1 style="text-align: center;">Welcome</h1>

<form>
    <fieldset>

        <label for="nombre">Nombre:</label><br>
        <input type="text" id="nombre" name="nombre" required placeholder="Ingrese su nombre">
        <br><br>

        <label for="apellido">Apellido:</label><br>
        <input type="text" id="apellido" name="apellido" required placeholder="Ingrese su apellido">
        <br><br>

        <label for="usuario">Nombre de usuario:</label><br>
        <input type="text" id="usuario" name="usuario" required placeholder="Ingrese su nombre de usuario">
        <br><br>

        <label for="correo">Correo electrónico:</label><br>
        <input type="email" id="correo" name="correo" required placeholder="ejemplo@correo.com">
        <br><br>

        <label for="contraseña">Contraseña:</label><br>
        <input type="password" id="contraseña" name="contraseña" required placeholder="Ingrese su contraseña">
        <br><br>
        <label for="confirmar_contraseña">Confirmar contraseña:</label><br>
        <input type="password" id="confirmar_contraseña" name="confirmar_contraseña" required placeholder="Confirme su contraseña">
        <br><br>
        
        <p>Género:</p>

        <input type="radio" id="hombre" name="género" value="Hombre">
        <label for="hombre">Hombre</label><br>

        <input type="radio" id="mujer" name="género" value="Mujer">
        <label for="mujer">Mujer</label><br>

        <input type="radio" id="otro" name="género" value="Prefiero no decirlo">
        <label for="otro">Prefiero no decirlo</label>
        <br><br>
        <input type="submit" value="Registrarse">
    </fieldset>

</form>

<body>
    
</body>
</html>
