<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de sesión</title>
</head>
<h1 style="text-align: center;">Welcome back</h1>

<form>
    <fieldset>
        <label for="correo">Correo electrónico:</label><br>
        <input type="email" id="correo" name="correo" required placeholder="ejemplo@correo.com">
        <br><br>
            
        <label for="contraseña">Contraseña:</label><br>
        <input type="password" id="contraseña" name="contraseña" required placeholder="Ingrese su contraseña">
        <br><br>
        <input type="submit" value="Iniciar sesión">
        <br><br>
        <label for="reestablecer">¿Olvidaste tu contraseña?</label><br>
        <input type="button" id="reestablecer" name="reestablecer" value="Reestablecer contraseña">
        <br><br>
        <label for="registro">¿No tienes una cuenta?</label><br>
        <input type="button" id="registro" name="registro" value="Registrarse">
        <br><br>
        <label for="terminos">Términos y Condiciones:</label><br>
        <input type="checkbox" id="terminos" name="terminos" required>
        <label for="terminos"> Acepto los términos y condiciones</label><br>    


    </fieldset>

</form>

<body>
    
</body>
</html>
